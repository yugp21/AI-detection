<!DOCTYPE html>
<html>
<head>
    <title>AI Text Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">Detector</a>
            <div class="nav-links-middle">
                <a href="/text_page">Text</a> | <a href="/voice_page">Voice</a>
            </div>
            <div class="nav-links"><a href="/about">About Us</a></div>
        </div>
    </nav>
    <div class="container">
        {% if not result %}
        <div class="glass-card">
            <h1>Text Detector</h1>
            <p class="subtitle">Paste your text below and find out — AI or human?</p>
            <form method="POST">
                <textarea name="text_content" rows="6" required></textarea>
                <button type="submit" class="btn">Scan Text</button>
            </form>
        </div>
        {% else %}
        <div class="glass-card">
            <h2 class="{{ 'fake' if 'AI' in result else 'real' }}">{{ result }}</h2>
            <p>Confidence: {{ confidence }}%</p>
            <div class="bar-bg"><div class="bar-fill" style="width: {{ confidence }}%"></div></div>
            <a href="/text_page" class="btn secondary-btn">Back</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
